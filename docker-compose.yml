services:
 
  # Symfony backend
  symfony:
    build: ./symfony
    container_name: symfony-api
    ports:
      - "8000:8000"
    volumes:
      - ./symfony:/app
    environment:
      APP_ENV: dev
      APP_SECRET: uneClefSecrete123
      # Connexion à MySQL (containeur 'db')
      DATABASE_URL: mysql://root:root@db:3306/lascar?serverVersion=8.0&charset=utf8mb4
    depends_on:
      - db
 
  # React frontend
  react:
    build: ./react
    container_name: react-app
    ports:
      - "5173:5173"
    volumes:
      - ./react:/app
      - /app/node_modules
    stdin_open: true
    tty: true
 
  # MySQL database(db)
  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_DATABASE: lascar
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db 

volumes:
  db_data:  

  